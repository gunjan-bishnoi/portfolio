<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0b10" />
      <stop offset="100%" stop-color="#141824" />
    </linearGradient>
    
    <!-- Text/Initials Gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    
    <!-- Glow Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <style>
      .bg-rect {
        fill: url(#bgGrad);
        stroke: rgba(59, 130, 246, 0.4);
        stroke-width: 2.5px;
      }
      .monogram {
        font-family: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-weight: 900;
        font-size: 52px;
        letter-spacing: -2px;
        fill: url(#textGrad);
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .accent-dot {
        fill: #60a5fa;
        filter: url(#glow);
      }
    </style>
  </defs>

  <!-- Premium Squircle App Icon Base -->
  <rect x="3" y="3" width="122" height="122" rx="36" class="bg-rect" />

  <!-- Neon Glowing Accent Circle at top right -->
  <circle cx="98" cy="30" r="6" class="accent-dot" />

  <!-- Minimalist Tech Grapheme "GB" -->
  <text x="62" y="66" class="monogram">GB</text>
</svg>
